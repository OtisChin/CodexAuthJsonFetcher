<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Auth 文件自助提货</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="hero-stack">
        <section class="hero-copy">
          <div class="brand-badge" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path
                d="M12 2l7 3v5c0 4.7-2.8 9-7 10-4.2-1-7-5.3-7-10V5l7-3z"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linejoin="round"
              />
              <path
                d="M9 12.2l2.2 2.3L15.8 10"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
          <h1>Codex 认证文件提取系统</h1>
          <p class="subcopy">上传邮箱或卡密，获取codex认证文件，可用于直接上传CPA或Sub2api等反代平台。</p>
        </section>

        <section class="panel">
          <section class="query-shell is-active" id="query-panel">
            <form class="query-form" id="query-form">
              <label class="field-label query-label" for="query-input">邮箱或邮箱-----密码</label>
              <div class="input-row">
                <div class="input-field">
                  <textarea
                    id="query-input"
                    name="input"
                    rows="10"
                    placeholder="一行一组，多行可批量提取，请输入邮箱或卡密（邮箱-----密码）。示例:

example1@hotmail.com
example2@hotmail.com-----pwd1
example3@hotmail.com-----pwd2"
                    autocomplete="off"
                    required
                  ></textarea>
                </div>
                <button class="primary-button" type="submit">立即查询</button>
              </div>
              <p class="helper-text query-tip">支持单个邮箱直接提取，也支持多行邮箱批量打包下载。</p>
            </form>
            <div class="result-card" id="query-result"></div>
          </section>
        </section>

        <section class="footer-note" aria-label="自助购号">
          <span class="footer-label">自助购号：</span>
          <a class="footer-link" href="https://pay.ldxp.cn/shop/rexmoo.ai" target="_blank" rel="noreferrer">
            https://pay.ldxp.cn/shop/rexmoo.ai
          </a>
        </section>
      </main>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
