<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Auth 文件自助提货</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="hero-stack">
        <section class="hero-copy">
          <div class="brand-badge" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path
                d="M12 2l7 3v5c0 4.7-2.8 9-7 10-4.2-1-7-5.3-7-10V5l7-3z"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linejoin="round"
              />
              <path
                d="M9 12.2l2.2 2.3L15.8 10"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
          <h1>Codex认证文件提取系统</h1>
          <p class="subcopy">上传邮箱或卡密，获取codex认证文件，可用于直接上传CPA或Sub2api等反代平台。</p>
        </section>

        <section class="panel">
          <div class="tabs" role="tablist" aria-label="功能切换">
            <button class="tab is-active" data-tab-target="query-panel" role="tab" type="button">
              文件提取
            </button>
            <button class="tab" data-tab-target="admin-panel" role="tab" type="button">
              管理上传
            </button>
          </div>

          <section class="tab-panel is-active" id="query-panel">
            <form class="query-form" id="query-form">
              <label class="field-label" for="query-input">邮箱或邮箱-----密码</label>
              <div class="input-row">
                <textarea
                  id="query-input"
                  name="input"
                  rows="1"
                  placeholder="example@gmail.com"
                  autocomplete="off"
                  required
                ></textarea>
                <button class="primary-button" type="submit">立即查询</button>
              </div>
            </form>
            <div class="result-card" id="query-result"></div>
          </section>

          <section class="tab-panel" id="admin-panel">
            <form class="stack-form" id="admin-form">
              <label class="field-label" for="admin-token">管理员口令</label>
              <input
                id="admin-token"
                name="adminToken"
                type="password"
                placeholder="输入 Cloudflare Secret 中配置的 ADMIN_TOKEN"
                required
              />

              <label class="field-label" for="admin-files">文件上传</label>
              <input
                id="admin-files"
                name="files"
                type="file"
                accept=".json,.zip,application/zip"
                multiple
              />

              <label class="field-label" for="admin-folder">文件夹上传</label>
              <input id="admin-folder" type="file" webkitdirectory directory multiple />

              <p class="helper-text">
                ZIP 和文件夹会自动筛出其中的 JSON；只有符合
                `token_xxx_hotmail.com_时间戳.json` 规则的文件会被建立索引。
              </p>

              <button class="primary-button wide" type="submit">上传并建立索引</button>
            </form>
            <div class="result-card" id="admin-result"></div>
          </section>
        </section>
      </main>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
