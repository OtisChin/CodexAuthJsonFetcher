"$schema" = "./node_modules/wrangler/config-schema.json"

name = "codex-auth-json-fetcher"
main = "src/index.js"
compatibility_date = "2026-04-09"
keep_vars = true

[assets]
binding = "ASSETS"
directory = "./public"

# R2/KV are bindings, not normal environment variables.
[[kv_namespaces]]
binding = "AUTH_INDEX"
id = "524366f6be1441409130db5c5d56ddf3"

[[r2_buckets]]
binding = "AUTH_BUCKET"
bucket_name = "codex-auth-files"
